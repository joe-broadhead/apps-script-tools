name: Apps Script AI Live Smoke

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Provider to smoke test"
        required: true
        default: openai
        type: choice
        options:
          - openai
          - gemini
          - vertex_gemini
          - openrouter
          - perplexity
      prompt:
        description: "Prompt to send"
        required: true
        default: "Reply with OK"
        type: string
      model:
        description: "Optional model override"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  live-ai-smoke:
    runs-on: ubuntu-latest
    env:
      SCRIPT_ID: ${{ vars.GAS_SCRIPT_ID }}
      CLASP_CLIENT_ID: ${{ secrets.CLASP_CLIENT_ID }}
      CLASP_CLIENT_SECRET: ${{ secrets.CLASP_CLIENT_SECRET }}
      CLASP_REFRESH_TOKEN: ${{ secrets.CLASP_REFRESH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies (lockfile-aware)
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci --ignore-scripts
          else
            npm install --ignore-scripts --no-audit --no-fund
          fi

      - name: Setup clasp auth and binding
        uses: ./.github/actions/setup-clasp
        with:
          script-id: ${{ env.SCRIPT_ID }}
          root-dir: apps_script_tools
          clasp-client-id: ${{ env.CLASP_CLIENT_ID }}
          clasp-client-secret: ${{ env.CLASP_CLIENT_SECRET }}
          clasp-refresh-token: ${{ env.CLASP_REFRESH_TOKEN }}

      - name: Push and execute live AI smoke
        env:
          INPUT_PROVIDER: ${{ inputs.provider }}
          INPUT_PROMPT: ${{ inputs.prompt }}
          INPUT_MODEL: ${{ inputs.model }}
        run: |
          clasp status
          clasp push
          AI_PARAMS="$(node -e "process.stdout.write(JSON.stringify([process.env.INPUT_PROVIDER || '', process.env.INPUT_PROMPT || '', process.env.INPUT_MODEL || '']))")"
          clasp run runAiLiveSmoke --params "$AI_PARAMS"
