name: Apps Script Integration

on:
  workflow_call:
    inputs:
      suite:
        description: "Integration suite to run"
        required: false
        default: functional
        type: string
    secrets:
      CLASP_CLIENT_ID:
        required: true
      CLASP_CLIENT_SECRET:
        required: true
      CLASP_REFRESH_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      suite:
        description: "Integration suite to run"
        required: true
        default: functional
        type: choice
        options:
          - functional
          - perf

permissions:
  contents: read

jobs:
  gas-tests:
    runs-on: ubuntu-latest
    env:
      SCRIPT_ID: ${{ vars.GAS_SCRIPT_ID }}
      CLASP_CLIENT_ID: ${{ secrets.CLASP_CLIENT_ID }}
      CLASP_CLIENT_SECRET: ${{ secrets.CLASP_CLIENT_SECRET }}
      CLASP_REFRESH_TOKEN: ${{ secrets.CLASP_REFRESH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '20'

      - name: Setup clasp auth and binding
        uses: ./.github/actions/setup-clasp
        with:
          script-id: ${{ env.SCRIPT_ID }}
          root-dir: apps_script_tools
          clasp-client-id: ${{ env.CLASP_CLIENT_ID }}
          clasp-client-secret: ${{ env.CLASP_CLIENT_SECRET }}
          clasp-refresh-token: ${{ env.CLASP_REFRESH_TOKEN }}

      - name: Push and execute integration tests
        env:
          INPUT_SUITE: ${{ inputs.suite }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          LOG_FILE="artifacts/gas-integration-${INPUT_SUITE}.log"
          clasp status
          clasp push
          if [ "${INPUT_SUITE}" = "perf" ]; then
            clasp run runPerformanceBenchmarks 2>&1 | tee "${LOG_FILE}"
          else
            clasp run runAllTests 2>&1 | tee "${LOG_FILE}"
          fi

      - name: Upload GAS integration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gas-integration-${{ inputs.suite }}-${{ github.run_id }}
          path: artifacts/gas-integration-*.log
          if-no-files-found: warn
          retention-days: 14
