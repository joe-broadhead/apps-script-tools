name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (for example v0.0.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '20'

      - name: Run lint and local tests
        run: |
          npm run lint
          npm run test:local
          npm run test:security
          npm run test:perf:check

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Build docs
        run: mkdocs build --strict

  github-release:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: resolve_tag
        env:
          WORKFLOW_EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "${WORKFLOW_EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ -z "${INPUT_TAG}" ]; then
              echo "Dispatch input 'tag' must be non-empty" >&2
              exit 1
            fi
            case "${INPUT_TAG}" in
              *$'\n'*|*$'\r'*)
                echo "Dispatch input 'tag' must not contain newlines" >&2
                exit 1
                ;;
            esac
            printf 'tag=%s\n' "${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          else
            printf 'tag=%s\n' "${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag exists
        run: git rev-parse "${{ steps.resolve_tag.outputs.tag }}"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          name: ${{ steps.resolve_tag.outputs.tag }}
          generate_release_notes: true
          body: |
            Script ID: `${{ vars.GAS_SCRIPT_ID }}`
            Library identifier: `AST`
            Docs: https://joe-broadhead.github.io/apps-script-tools/

            Apps Script library mapping:
            - Add the exact Apps Script version number created by `clasp version "<tag>"`.
            - Keep this mapping in sync with `RELEASE.md`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
