name: Security - Secret Scan

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '20'
          install-deps: 'true'

      - name: Run deterministic secret scan
        run: npm run test:security
